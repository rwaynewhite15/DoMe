# Render Blueprint for DoMe.
# In Render: New → Blueprint → connect this repo. Render provisions the web
# service and prompts for the secrets marked `sync: false` (your Neon DB URLs,
# Resend settings, APP_URL, and a CRON_SECRET). AUTH_SECRET is generated
# automatically.
#
# The daily points digest is triggered by a free scheduled GitHub Action
# (.github/workflows/daily-digest.yml) that POSTs to /api/cron/daily — Render
# cron jobs are a paid add-on, so we keep the Blueprint on the free tier.

services:
  - type: web
    name: dome
    runtime: node
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - fromGroup: dome-env

envVarGroups:
  - name: dome-env
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: APP_URL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: AUTH_SECRET
        generateValue: true
