# Render Blueprint for DoMe.
# In Render: New → Blueprint → connect this repo. Render provisions the (free)
# web service and prompts for every variable marked `sync: false` — your Neon DB
# URLs, Resend settings, APP_URL, and a CRON_SECRET. AUTH_SECRET is generated
# automatically.
#
# The daily points digest is triggered by a free scheduled GitHub Action
# (.github/workflows/daily-digest.yml) that POSTs to /api/cron/daily — Render
# cron jobs are a paid add-on, so we keep the Blueprint on the free tier.

services:
  - type: web
    name: dome
    runtime: node
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    # The final step fires the daily digest on every deploy (idempotent per
    # local day via NotificationLog, so redeploys won't double-send). It is
    # made non-fatal with `|| true` so a digest hiccup never blocks a deploy.
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build && (npm run cron:daily || true)
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: APP_URL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: AUTH_SECRET
        generateValue: true
