# Render Blueprint for DoMe.
# In Render: New → Blueprint → connect this repo. Render provisions the web
# service + daily cron job and prompts for the secrets marked `sync: false`
# (your Neon DB URLs + Resend settings). AUTH_SECRET and CRON_SECRET are
# generated automatically and shared across both services via the env group.

services:
  - type: web
    name: dome
    runtime: node
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - fromGroup: dome-env

  - type: cron
    name: dome-daily-digest
    runtime: node
    plan: free
    region: oregon
    branch: main
    # 13:00 UTC daily — adjust to a morning hour for your timezone.
    schedule: "0 13 * * *"
    buildCommand: npm install
    startCommand: node scripts/cron-trigger.mjs
    envVars:
      - fromGroup: dome-env

envVarGroups:
  - name: dome-env
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: APP_URL
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
